name: Generate Resume PDF

on:
  push:
    paths:
      - "data/resume.json"
    branches:
      - nextjs
      - feature/resume-page
  workflow_dispatch:

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright
        run: pnpm exec playwright install chromium

      - name: Build site
        run: pnpm build

      - name: Start server and generate PDF
        run: |
          pnpm start &
          SERVER_PID=$!
          sleep 5
          pnpm exec tsx scripts/generate-resume-pdf.ts
          kill $SERVER_PID || true

      - name: Commit PDF if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/Resume_YiAn_Lai_2026.pdf .resume-hash
          git diff --staged --quiet || git commit -m "chore: regenerate resume PDF"
          git push

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: public/Resume_YiAn_Lai_2026.pdf

      - name: Create Release
        if: github.ref == 'refs/heads/nextjs'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: resume-${{ github.run_number }}
          name: Resume Update ${{ github.run_number }}
          files: public/Resume_YiAn_Lai_2026.pdf
          body: |
            Auto-generated resume PDF from resume.json changes.

            Commit: ${{ github.sha }}
