name: Notify Build Failure

on:
  # Vercel reports status via deployment_status events
  deployment_status:

jobs:
  notify-failure:
    # Only run on failure, and only for production
    if: ${{ github.event.deployment_status.state == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram Notification
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          REPO="${{ github.repository }}"
          BRANCH="${{ github.event.deployment.ref }}"
          SHA="${{ github.event.deployment.sha }}"
          SHORT_SHA="${SHA:0:7}"
          DEPLOY_URL="${{ github.event.deployment_status.target_url }}"

          MESSAGE="❌ *Build Failed*

          📦 \`${REPO}\`
          🌿 Branch: \`${BRANCH}\`
          🔗 Commit: [${SHORT_SHA}](https://github.com/${REPO}/commit/${SHA})
          🔍 [View Deployment](${DEPLOY_URL})"

          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d text="${MESSAGE}"

          echo "Notification sent!"

  notify-success:
    # Optional: notify on successful production deploys
    if: ${{ github.event.deployment_status.state == 'success' && github.event.deployment.environment == 'Production' }}
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram Notification
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          REPO="${{ github.repository }}"
          DEPLOY_URL="${{ github.event.deployment_status.environment_url }}"
          SHORT_SHA="${{ github.event.deployment.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"

          MESSAGE="✅ *Deploy Successful*

          📦 \`${REPO}\`
          🚀 [${SHORT_SHA}](${DEPLOY_URL})"

          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d text="${MESSAGE}"
