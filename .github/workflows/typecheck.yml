name: Typecheck

# Enforces TypeScript for the web app. `pnpm typecheck` runs `tsc` over the
# Next.js source. The orchestration engine now lives in the Teahouse package
# (ADR-0014), not this repo, so it is typechecked in its own CI — this job no
# longer typechecks a vendored `.sandcastle/`. See issue #103, #112.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (web app)
        run: pnpm typecheck
